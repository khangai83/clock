# ============================================
# GitHub Actions - Automatik deploy to Pages
# ============================================
# Энэ workflow нь main branch руу push хийх бүрт
# Flutter web аппыг автоматаар build хийж,
# GitHub Pages руу deploy хийнэ.
#
# Ашиглах заавар:
# 1. GitHub Repository Settings → Pages → Source: GitHub Actions
# 2. Эсвэл энэ workflow автоматаар ажиллана
# ============================================

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release --base-href="/clock/"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
